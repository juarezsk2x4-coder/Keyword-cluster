# Kitchen, storage, shopping windows, and store info.

# ── Kitchen equipment ────────────────────────────────────────────────────────
# Marks what the Meal Plan Designer can assume is available.
kitchen_equipment:
  fogao_bocas: 4              # number of burners
  forno: true
  microondas: true
  airfryer: false
  panela_pressao_eletrica: false  # ex: Mondial Pratic, Electrolux
  panela_pressao_comum: true
  liquidificador: true
  processador: false
  mixer: false
  grill_eletrico: false
  sanduicheira: false
  espremedor_citrus: false
  balança_cozinha: false       # important for portioning — recommend acquiring if false

# ── Storage (rough capacity, not exact) ──────────────────────────────────────
storage:
  fridge_liters: FILL_IN       # geladeira ~ 300L típica de casal, 400L+ família
  freezer_liters: FILL_IN      # freezer separado ou só o do topo da geladeira?
  freezer_separate: false      # true se tem freezer horizontal ou separado
  pantry_shelves: FILL_IN      # quantas prateleiras de despensa/armário pra secos

# ── Shopping cadence (confirmed: bi-weekly bulk + weekly produce) ────────────
shopping_windows:
  bulk:
    cadence: bi_weekly         # weekly | bi_weekly | monthly
    day: saturday              # monday..sunday
    stores: [forte_atacado, imperatriz]
  produce:
    cadence: weekly
    day: wednesday
    stores: [imperatriz, ifood]
  emergency_topup:
    stores: [ifood]

# ── Stores (Florianópolis — Canasvieiras region) ─────────────────────────────
stores:
  ifood:
    delivery_address: "Canasvieiras, Florianópolis"
    confirmed_zone: false      # set true once you've checked the address loads in iFood
    preferred_markets: []      # ex: ["Imperatriz Canasvieiras", "Hippo", "Angeloni Cachoeira do Bom Jesus"]
                               # leave empty to let the scout pick by price
  forte_atacado:
    branch: FILL_IN            # ex: "Forte Atacadista SC-401" | "Forte Atacadista São José"
    address: FILL_IN
    has_delivery: false
    pickup_only: true
  imperatriz:
    branch: FILL_IN            # ex: "Imperatriz Canasvieiras" | "Imperatriz Cachoeira do Bom Jesus"
    address: FILL_IN
    has_delivery: true
    delivery_address: "Canasvieiras, Florianópolis"

# ── Budget ───────────────────────────────────────────────────────────────────
budget:
  brl_per_week_combined: 500   # confirmed: R$ 400–600/week range, defaulting to 500
  hard_cap: false              # true = never exceed; false = warn if over
  prioritize:                  # ordered: what to keep paying for if budget is tight
    - proteina_alta_qualidade  # ovos, peito frango, peixe
    - hortifruti_estacao
    - graos_integrais
    - laticinios
    - oleaginosas

# ── Delivery preferences ─────────────────────────────────────────────────────
delivery:
  acceptable_fee_brl: 8        # ignore iFood options where delivery fee > this
  acceptable_eta_min: 60       # ignore options that take longer than this
